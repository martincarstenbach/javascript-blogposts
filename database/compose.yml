# THIS IS NOT A PRODUCTION SETUP - LAB USE ONLY!
#
# See https://container-registry.oracle.com/ords/ocr/ba/database/free
# for details

services:
    oracle:
        image: container-registry.oracle.com/database/free:23.8.0.0
        ports:
            - 1521:1521
        environment:
            - ORACLE_PWD=changeOnInstall
        volumes:
            - oradata-vol:/opt/oracle/oradata
            - ./initialisation:/opt/oracle/scripts/startup:Z
        networks:
            - backend
        healthcheck:
            test: [ "CMD", "healthcheck.sh" ]
            interval: 10s
            timeout: 5s
            retries: 10
            start_period: 5s

volumes:
    oradata-vol:

networks:
    backend:
