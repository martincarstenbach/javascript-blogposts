name: validate compose files

on:
    push:
    pull_request:
    workflow_dispatch:

jobs:
    podman-compose-file-validation:
        name: ${{ matrix.file }}
        runs-on: ubuntu-26.04
        timeout-minutes: 4
        strategy:
            fail-fast: true
            matrix:
                include:
                    - file: compose-podman-db.yml
                    - file: compose-podman-ords-apex.yml
        env:
            ORACLE_PASSWORD: ci-only-db-password
            APP_USER_PASSWORD: ci-only-app-user-password
        steps:
            - uses: actions/checkout@v7
            - name: install podman compose
              run: |
                sudo apt-get update
                sudo apt-get install --yes --no-install-recommends podman-compose
                podman compose --version
            - name: validate podman compose file
              run: |
                podman compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                config
            - name: start services in ${{ matrix.file }} using podman compose
              run: |
                podman compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                up --detach

    docker-compose-file-validation:
        name: ${{ matrix.file }}
        runs-on: ubuntu-26.04
        timeout-minutes: 4
        strategy:
            fail-fast: true
            matrix:
                include:
                    - file: compose-docker-db.yml
                    - file: compose-docker-ords-apex.yml
        env:
            ORACLE_PASSWORD: ci-only-db-password
            APP_USER_PASSWORD: ci-only-app-user-password
        steps:
            - uses: actions/checkout@v7
            - name: validate docker compose file
              run: |
                docker compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                config
            - name: start services in ${{ matrix.file }} using docker compose
              run: |
                docker compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                up --detach
            - name: start services in ${{ matrix.file }} using podman compose
              run: |
                docker compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                up --detach
    
    service-health-validation:
        name: ${{ matrix.file }}
        runs-on: ubuntu-26.04
        strategy:
            fail-fast: true
            matrix:
                include:
                    - file: compose-podman-db.yml
                      runtime: podman
                    - file: compose-podman-ords-apex.yml
                      runtime: podman
                    - file: compose-docker-db.yml
                      runtime: docker
                    - file: compose-docker-ords-apex.yml
                      runtime: docker
        steps:
            - name: ensure service health in file ${{ matrix.file }}
              shell: bash
              run: |
                set -Eeuo pipefail

                # Keep compose arguments in one helper so status and log commands
                # use the exact same file and project directory as `up`.
                compose() {
                    ${{ matrix.runtime }} compose \
                    --project-directory database \
                    --file database/${{ matrix.file }} "$@"
                }

                # Obtain the expected service names from the selected Compose file;
                # this automatically covers services added in future file changes.
                mapfile -t services < <(compose config --services)
                deadline=$((SECONDS + 120))
                while (( SECONDS < deadline )); do
                    unhealthy=0

                    for service in "${services[@]}"; do
                    container_id="$(compose ps --quiet "$service")"

                    # A missing ID means Compose did not create this service yet (or
                    # it exited before the probe could inspect it).
                    if [[ -n "$container_id" ]]; then
                        # A container without a healthcheck is explicitly treated as a
                        # failure rather than being mistaken for a healthy container.
                        status="$(${{ matrix.runtime }} inspect \
                        --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}missing-healthcheck{{end}}' \
                        "$container_id")"
                        echo "$service: $status"

                        if [[ "$status" != healthy ]]; then
                        unhealthy=1
                        fi
                    else
                        echo "$service: container not started"
                        unhealthy=1
                    fi
                    done

                    if (( unhealthy == 0 )); then
                    exit 0
                    fi

                    sleep 5
                done

                # Make the failure actionable: `ps` prints a state for every service
                # in this Compose file, followed by the final 200 log lines.
                echo "One or more services did not become healthy within 120 seconds."
                compose ps
                compose logs --no-color --tail=200
                exit 1
            - name: cleanup
              if: always()
              run: |
                ${{ matrix.runtime }} compose \
                --project-directory database \
                --file database/${{ matrix.file }} \
                down --volumes --remove-orphans
